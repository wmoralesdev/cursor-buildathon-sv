<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var v = localStorage.getItem("cursor-buildathon-lang");
          if (v === "es" || v === "en") document.documentElement.lang = v;
        } catch (_) {}
      })();
    </script>
    <script type="module">
      const devtoolsEnabled = import.meta.env.VITE_DEVTOOLS_ENABLED !== "false";
      if (import.meta.env.DEV && devtoolsEnabled) {
        import("react-grab");
        import("@react-grab/mcp/client");
        const script = document.createElement("script");
        script.src = "https://unpkg.com/react-scan/dist/auto.global.js";
        script.crossOrigin = "anonymous";
        document.head.appendChild(script);
      }
    </script>
    <meta charset="UTF-8" />
